name: Build Windows Platform Only

on:
    workflow_dispatch:  # 手动触发构建，替代 push 事件

jobs:
    build_yakit:
        runs-on: windows-latest  # 仅在 Windows 环境下构建
        env:
            CI: ""
            NODE_OPTIONS: --max_old_space_size=4096

        steps:
            - uses: actions/checkout@v4  # 检出代码
            - uses: actions/setup-node@v4  # 设置 Node.js 环境
              with:
                  node-version: 18.18.2  # 使用 Node.js 版本 18.18.2

            - run: echo ${{ github.ref_name }}  # 打印当前标签名称

            # 安装 wget 下载工具
            - name: Install wget tool
              run: |
                choco install wget -y  # 使用 Chocolatey 安装 wget
              shell: powershell

            # 下载 Yakit Chrome 扩展（使用写死的 URL）
            - name: "Download yakit-chrome-extension"
              run: |
                # 写死的扩展版本和下载链接
                $downloadUrl = "https://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/yakit-chrome-extension-v0.0.7.zip"
                Write-Host "Downloading extension from: $downloadUrl"
                # 检查文件是否已存在
                if (Test-Path "bins/scripts/google-chrome-plugin.zip") {
                    Write-Host "File already exists, skipping download."
                } else {
                    # 使用 curl 下载文件
                    Invoke-WebRequest -Uri $downloadUrl -OutFile "bins/scripts/google-chrome-plugin.zip"
                    if ($?) {
                        Write-Host "Extension downloaded successfully!"
                    } else {
                        Write-Host "Failed to download the extension!" -ForegroundColor Red
                        exit 1
                    }
                }
              shell: powershell

            # 获取最新的引擎版本并设置为环境变量
            # - name: "Fetch Latest Engine Version And Set To Env"
            #   run: |
            #     $engineVersionUrl = "https://yaklang.oss-accelerate.aliyuncs.com/yak/latest/version.txt"
            #     $engineVersionFile = "bins/engine-version.txt"
            #     # 如果文件已存在，则跳过下载
            #     if (-Not (Test-Path $engineVersionFile)) {
            #         Invoke-WebRequest -Uri $engineVersionUrl -OutFile $engineVersionFile
            #     }
            #     $engineVersion = (Get-Content $engineVersionFile | Out-String).Trim()  # 使用 Trim() 方法
            #     Write-Host "Engine Version: $engineVersion"
            #     echo "ENGINE_VERSION=$engineVersion" >> $GITHUB_ENV
            #   shell: powershell


            # 下载 Windows 引擎（使用固定的引擎版本）
            - name: "Download Yak Engine for Windows"
              run: |
                $engineUrl = "https://yaklang.oss-accelerate.aliyuncs.com/yak/1.4.3-beta8/yak_windows_amd64.exe"  # 使用固定版本的引擎 URL
                $outputFile = "bins/yak_windows_amd64.exe"
                if (-Not (Test-Path $outputFile)) {
                    Invoke-WebRequest -Uri $engineUrl -OutFile $outputFile
                    # 使用 7-Zip 压缩文件
                    7z a -tzip "bins/yak_windows_amd64.zip" $outputFile
                    Remove-Item $outputFile
                    Write-Host "Yak Engine for Windows downloaded and zipped!"
                } else {
                    Write-Host "Yak Engine for Windows already exists, skipping download."
                }
              shell: powershell

            # 构建 Windows 平台的 Yakit
            - name: "Build Windows Yakit Normal And Legacy"
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              working-directory: ./ 
              run: ./packageScript/script/electron-builder.sh ce || { exit 1; }
              shell: bash

            # 查看构建的内容
            - name: View Published Content
              run: |
                  ls ./release
            # 校验 Windows 构建包
            - name: Check Yakit if the output is correct
              run: (./packageScript/script/check-build-package.sh Yakit) || { exit 1; }
              shell: bash

            # 上传 Windows 构建产物
            - name: Upload Yakit Windows Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: Yakit-windows-artifacts
                  path: |
                      ./release/Yakit-${{ env.ENV_TAG }}-*.exe
                  if-no-files-found: error
                  retention-days: 1
